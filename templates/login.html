<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login — SwiftSlot</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
    font-family:Inter,sans-serif;
    background:#f1f5f9;
    display:flex;
    min-height:100vh;
    align-items:center;
    justify-content:center;
}
.auth-card{
    width:380px;
    background:white;
    border-radius:16px;
    padding:40px;
    box-shadow:0 10px 30px rgba(0,0,0,0.08);
}
.brand{
    font-weight:800;
    font-size:18px;
    color:#0d1b3e;
    margin-bottom:6px;
}
.subtitle{
    font-size:13px;
    color:#94a3b8;
    margin-bottom:30px;
}
label{
    font-size:11px;
    font-weight:700;
    text-transform:uppercase;
    letter-spacing:0.5px;
    color:#64748b;
}
input{
    width:100%;
    height:40px;
    padding:0 12px;
    margin-top:6px;
    margin-bottom:18px;
    border-radius:8px;
    border:1px solid #e2e8f0;
    font-size:13px;
    background:#f8fafc;
}
input:focus{
    outline:none;
    border-color:#2563eb;
    background:white;
}
button{
    width:100%;
    height:42px;
    border:none;
    border-radius:10px;
    background:linear-gradient(135deg,#1e3a8a,#2563eb);
    color:white;
    font-weight:700;
    font-size:14px;
    cursor:pointer;
}
button:hover{opacity:0.95}
.switch{
    margin-top:18px;
    font-size:12px;
    text-align:center;
}
.switch a{
    color:#2563eb;
    text-decoration:none;
    font-weight:600;
}
</style>
</head>
<body>
<div class="auth-card">
    <div class="brand">SwiftSlot</div>
    <div class="subtitle">Sign in to your clinic dashboard</div>
    <form method="post" action="/login">
        <label>Email</label>
        <input type="email" name="email" required>
        <label>Password</label>
        <input type="password" name="password" required>
        <button type="submit">Login</button>
    </form>
    <div class="switch">
        Don’t have an account? <a href="/signup-page">Create one</a>
    </div>
</div>
</body>
</html>
