<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login — SwiftSlot</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
    font-family:Inter,sans-serif;
    background:#f1f5f9;
    display:flex;
    min-height:100vh;
    align-items:center;
    justify-content:center;
}
.auth-card{
    width:380px;
    background:white;
    border-radius:16px;
    padding:40px;
    box-shadow:0 10px 30px rgba(0,0,0,0.08);
}
.brand{
    font-weight:800;
    font-size:18px;
    color:#0d1b3e;
    margin-bottom:6px;
}
.subtitle{
    font-size:13px;
    color:#94a3b8;
    margin-bottom:30px;
}
label{
    font-size:11px;
    font-weight:700;
    text-transform:uppercase;
    letter-spacing:0.5px;
    color:#64748b;
}
input{
    width:100%;
    height:40px;
    padding:0 12px;
    margin-top:6px;
    margin-bottom:18px;
    border-radius:8px;
    border:1px solid #e2e8f0;
    font-size:13px;
    background:#f8fafc;
}
input:focus{
    outline:none;
    border-color:#2563eb;
    background:white;
}
button{
    width:100%;
    height:42px;
    border:none;
    border-radius:10px;
    background:linear-gradient(135deg,#1e3a8a,#2563eb);
    color:white;
    font-weight:700;
    font-size:14px;
    cursor:pointer;
}
button:hover{opacity:0.95}
.switch{
    margin-top:18px;
    font-size:12px;
    text-align:center;
}
.switch a{
    color:#2563eb;
    text-decoration:none;
    font-weight:600;
}
.error-box{
    display:none;
    margin-bottom:16px;
    padding:10px 12px;
    border-radius:8px;
    background:#fee2e2;
    color:#991b1b;
    font-size:12px;
    line-height:1.4;
}
.error-box.show{display:block}
</style>
</head>
<body>
<div class="auth-card">
    <div class="brand">SwiftSlot</div>
    <div class="subtitle">Sign in to your clinic dashboard</div>
    <div class="error-box" id="loginError"></div>
    <form method="post" action="/login" id="loginForm">
        <label>Email</label>
        <input type="email" name="email" required>
        <label>Password</label>
        <input type="password" name="password" required>
        <button type="submit" id="loginButton">Login</button>
    </form>
    <div class="switch">
        Don’t have an account? <a href="/signup-page">Create one</a>
    </div>
</div>
<script>
(function(){
  var form=document.getElementById('loginForm');
  var error=document.getElementById('loginError');
  var button=document.getElementById('loginButton');
  function showError(message){ error.textContent=message; error.className='error-box show'; }
  form.addEventListener('submit',function(event){
    event.preventDefault();
    error.className='error-box';
    button.disabled=true;
    button.textContent='Signing in...';
    fetch('/login',{method:'POST',body:new FormData(form)})
      .then(function(response){
        if(response.redirected){ window.location.href=response.url; return null; }
        if(response.ok){ window.location.href='/app/dashboard'; return null; }
        return response.json().catch(function(){ return {}; }).then(function(data){
          throw new Error(response.status===401 ? 'Incorrect email or password.' : (data.error || 'Could not sign in. Please try again.'));
        });
      })
      .catch(function(err){ showError(err.message || 'Could not sign in. Please try again.'); })
      .finally(function(){ button.disabled=false; button.textContent='Login'; });
  });
})();
</script>
</body>
</html>
